snippets:
  nina:
    Hair: Tidy
    Clothes: Red dress
  warm_style:
    Camera: iPhone
    Color: Warm
  diner: a cozy 1950s American diner with checkered floors

# --- Structured prompt example ---
diner_scene:
  - active: False
    prompt:
      Subjects:
        - Lisa: An old lady with grey hair and kind eyes
        - George is a retired professor with round glasses
        - Nina: $nina
      Setting: Lisa, Nina and George are sharing a meal at $diner
      Style: $warm_style
    negative: blurry, low quality, text, logo

gorilla:
  - active: False
    prompt: |
      A gorilla. Detailed fur.
      In a jungle. Rainy day. Moody lighting.

woman:
  - active: True
    prompt: |
      30yo woman, in red dress.
      Walking down a city street among crowds of suited businessmen. Evening. Did you notice her, Neo?
    negative: |
      blurry, low quality, text, logo